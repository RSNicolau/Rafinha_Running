[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && cd apps/api && npx prisma generate && npx prisma db push --skip-generate --accept-data-loss && cd ../.. && pnpm --filter @rr/api build"

[deploy]
startCommand = "node /app/apps/api/dist/main"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
