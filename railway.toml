[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && cd apps/api && npx prisma generate && npx nest build"

[deploy]
startCommand = "cd /app/apps/api && npx prisma migrate deploy && node /app/apps/api/dist/main"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
