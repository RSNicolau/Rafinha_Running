[build]
builder = "nixpacks"
buildCommand = "cd apps/api && npx prisma generate && npx prisma migrate deploy && cd ../.. && pnpm --filter @rr/api build"

[deploy]
startCommand = "node /app/apps/api/dist/main"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
