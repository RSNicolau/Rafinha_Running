name: E2E Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

jobs:
  e2e:
    name: E2E Tests (Production)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: cd ../.. && pnpm install --frozen-lockfile

      - name: Run E2E tests against production
        run: ~/.nvm/versions/node/v20.20.1/bin/npx jest --config jest-e2e.config.js --no-coverage
        env:
          TEST_API_URL: https://rrapi-production.up.railway.app
