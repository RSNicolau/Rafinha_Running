name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

jobs:
  e2e-api:
    name: API E2E Tests (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: cd ../.. && pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run API E2E tests
        run: npx jest --config jest-e2e.config.js --passWithNoTests --no-coverage
        env:
          TEST_API_URL: https://rrapi-production.up.railway.app
          JWT_SECRET: test-secret-min-32-chars-for-ci-run
          JWT_REFRESH_SECRET: test-refresh-secret-32-chars-for-ci

  e2e-web:
    name: Web E2E Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: cd ../.. && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build web app
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=list
        env:
          CI: true
          BASE_URL: http://localhost:3001

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
